name: GemmaChat
options:
  bundleIdPrefix: com.gemma
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  GemmaCore:
    path: ../../GemmaCore

targets:
  GemmaChat:
    type: application
    platform: iOS
    sources:
      - path: GemmaChat
      - path: ../../gemma4-e2b.mlpackage
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gemma.chat
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Gemma Chat"
    preBuildScripts:
      - name: Download Tokenizer
        script: |
          TOKENIZER_PATH="${SRCROOT}/GemmaChat/Resources/tokenizer.json"
          if [ ! -f "$TOKENIZER_PATH" ]; then
            echo "Downloading tokenizer.json from HuggingFace..."
            curl -fSL "https://huggingface.co/google/gemma-4-E2B-it/resolve/main/tokenizer.json" \
              -o "$TOKENIZER_PATH"
          fi
        basedOnDependencyAnalysis: false
    dependencies:
      - package: GemmaCore
        product: GemmaCore

schemes:
  GemmaChat:
    build:
      targets:
        GemmaChat: all
    run:
      config: Debug
